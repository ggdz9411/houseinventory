<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Casa</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #faf5ff; touch-action: manipulation; }
    .modal-sheet { max-height: 90vh; max-height: 90dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });
  </script>
  <script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── Icons ─────────────────────────────────────────────────────────────────────
const svg = (content, size) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {content}
  </svg>
);
const IconHome    = ({ size=20 }) => svg(<><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>, size);
const IconCart    = ({ size=20 }) => svg(<><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></>, size);
const IconPackage = ({ size=20 }) => svg(<><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>, size);
const IconEdit    = ({ size=16 }) => svg(<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>, size);
const IconTrash   = ({ size=16 }) => svg(<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>, size);
const IconAlert   = ({ size=14 }) => svg(<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>, size);
const IconCheck   = ({ size=48 }) => svg(<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>, size);
const IconInbox   = ({ size=48 }) => svg(<><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></>, size);

// ── helpers ──────────────────────────────────────────────────────────────────
const FILL_LEVELS = ["Full", "Half", "Low", "Out"];
const FILL_ORDER  = { Full: 0, Half: 1, Low: 2, Out: 3 };
const CATEGORIES  = ["Food", "Cleaning", "Hygiene", "Other"];

const FILL_COLOR = {
  Full: { bg: "#d1fae5", text: "#065f46", dot: "#10b981" },
  Half: { bg: "#fef9c3", text: "#713f12", dot: "#eab308" },
  Low:  { bg: "#ffedd5", text: "#7c2d12", dot: "#f97316" },
  Out:  { bg: "#fee2e2", text: "#7f1d1d", dot: "#ef4444" },
};

const uid = () => Math.random().toString(36).slice(2, 9);

const defaultItems = [
  { id: uid(), name: "Dish Soap",      category: "Cleaning", quantity: 1, fill: "Low",  warnQty: 1, warnFill: "Low"  },
  { id: uid(), name: "Shampoo",        category: "Hygiene",  quantity: 2, fill: "Low",  warnQty: 1, warnFill: "Low"  },
  { id: uid(), name: "Toilet Paper",   category: "Hygiene",  quantity: 4, fill: "Full", warnQty: 2, warnFill: "Low"  },
  { id: uid(), name: "Olive Oil",      category: "Food",     quantity: 1, fill: "Half", warnQty: 1, warnFill: "Low"  },
  { id: uid(), name: "Laundry Powder", category: "Cleaning", quantity: 1, fill: "Full", warnQty: 1, warnFill: "Half" },
  { id: uid(), name: "Water (gallon)", category: "Food",     quantity: 2, fill: "Full", warnQty: 1, warnFill: "Low"  },
];

const needsRestock = (item) =>
  item.quantity <= item.warnQty ||
  FILL_ORDER[item.fill] >= FILL_ORDER[item.warnFill];

// ── sub-components ────────────────────────────────────────────────────────────
function FillBadge({ level, small }) {
  const c = FILL_COLOR[level];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      background: c.bg, color: c.text,
      borderRadius: 99, padding: small ? "2px 8px" : "4px 10px",
      fontSize: small ? 11 : 12, fontWeight: 600, letterSpacing: ".3px",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: c.dot, flexShrink: 0 }} />
      {level}
    </span>
  );
}

function CategoryPill({ cat, active, onClick }) {
  return (
    <button type="button" onClick={onClick} style={{
      padding: "6px 14px", borderRadius: 99, border: "none", cursor: "pointer",
      fontSize: 13, fontWeight: 600, transition: "all .15s",
      background: active ? "#7c3aed" : "#f3e8ff",
      color: active ? "#fff" : "#64748b",
    }}>{cat}</button>
  );
}

// ── ItemForm (add / edit) ─────────────────────────────────────────────────────
function ItemForm({ initial, onSave, onCancel }) {
  const blank = { name: "", category: "Food", quantity: 1, fill: "Full", warnQty: 1, warnFill: "Low" };
  const [form, setForm] = useState(initial ?? blank);
  const [nameError, setNameError] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const labelStyle = { fontSize: 12, fontWeight: 700, color: "#64748b", letterSpacing: ".5px", textTransform: "uppercase", marginBottom: 4, display: "block" };
  const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 10, border: "1.5px solid #e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box", background: "#fff", fontFamily: "inherit" };
  const selectStyle = { ...inputStyle, appearance: "none", cursor: "pointer" };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div>
        <label style={labelStyle}>Item name</label>
        <input style={{ ...inputStyle, borderColor: nameError ? "#ef4444" : "#e2e8f0" }} value={form.name} onChange={e => { set("name", e.target.value); if (nameError) setNameError(false); }} placeholder="e.g. Shampoo" />
        {nameError && <p style={{ margin: "5px 0 0", fontSize: 12, color: "#ef4444", fontWeight: 500 }}>Please enter an item name.</p>}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <div>
          <label style={labelStyle}>Category</label>
          <select style={selectStyle} value={form.category} onChange={e => set("category", e.target.value)}>
            {CATEGORIES.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>Quantity</label>
          <input style={inputStyle} type="text" inputMode="numeric" value={form.quantity === 0 ? '' : form.quantity} onChange={e => { const v = e.target.value.replace(/\D/g, ''); set("quantity", v === '' ? 0 : parseInt(v, 10)); }} />
        </div>
      </div>

      <div>
        <label style={labelStyle}>Current fill level</label>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {FILL_LEVELS.map(l => (
            <button type="button" key={l} onClick={() => set("fill", l)} style={{
              padding: "7px 14px", borderRadius: 99, border: "2px solid",
              borderColor: form.fill === l ? FILL_COLOR[l].dot : "#e2e8f0",
              background: form.fill === l ? FILL_COLOR[l].bg : "#fff",
              color: form.fill === l ? FILL_COLOR[l].text : "#94a3b8",
              fontWeight: 600, fontSize: 13, cursor: "pointer",
            }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{ background: "#f8fafc", borderRadius: 12, padding: 14, display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ color: "#f59e0b", display: "flex" }}><IconAlert size={13}/></span>
          <p style={{ margin: 0, fontSize: 12, fontWeight: 700, color: "#94a3b8", letterSpacing: ".5px", textTransform: "uppercase" }}>Restock warning triggers when…</p>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div>
            <label style={labelStyle}>Quantity below</label>
            <div style={{ display: "flex", gap: 6 }}>
              <input
                style={{ ...inputStyle, opacity: form.warnQty === 0 ? 0.4 : 1 }}
                type="text" inputMode="numeric" value={form.warnQty === 0 ? '' : form.warnQty}
                onChange={e => { const v = e.target.value.replace(/\D/g, ''); set("warnQty", v === '' ? 0 : parseInt(v, 10)); }}
              />
              <button
                type="button"
                onClick={() => set("warnQty", 0)}
                title="Ignore quantity — warn by fill level only"
                style={{
                  flexShrink: 0, padding: "0 10px", borderRadius: 10, border: "1.5px solid",
                  borderColor: form.warnQty === 0 ? "#7c3aed" : "#e2e8f0",
                  background: form.warnQty === 0 ? "#7c3aed" : "#fff",
                  color: form.warnQty === 0 ? "#fff" : "#94a3b8",
                  cursor: "pointer", fontSize: 13, fontWeight: 700, whiteSpace: "nowrap",
                }}>
                —
              </button>
            </div>
            {form.warnQty === 0 && (
              <p style={{ margin: "5px 0 0", fontSize: 11, color: "#94a3b8" }}>Fill level only</p>
            )}
          </div>
          <div>
            <label style={labelStyle}>Fill reaches</label>
            <select style={selectStyle} value={form.warnFill} onChange={e => set("warnFill", e.target.value)}>
              {FILL_LEVELS.map(l => <option key={l}>{l}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 10 }}>
        <button type="button" onClick={onCancel} style={{ flex: 1, padding: "12px", borderRadius: 12, border: "1.5px solid #e2e8f0", background: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", color: "#64748b" }}>Cancel</button>
        <button type="button" onClick={() => { if (!form.name.trim()) { setNameError(true); return; } onSave(form); }} style={{ flex: 2, padding: "12px", borderRadius: 12, border: "none", background: "#7c3aed", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 14px rgba(124,58,237,.4)" }}>
          {initial ? "Save changes" : "Add item"}
        </button>
      </div>
    </div>
  );
}

// ── RestockPrompt ─────────────────────────────────────────────────────────────
function RestockPrompt({ item, onConfirm, onCancel }) {
  const [qty, setQty] = useState(1);
  const [fill, setFill] = useState("Full");
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ textAlign: "center" }}>
        <p style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 800, color: "#1a1a2e" }}>Restocking</p>
        <p style={{ margin: 0, fontSize: 15, color: "#64748b" }}>{item.name}</p>
      </div>
      <div>
        <label style={{ fontSize: 12, fontWeight: 700, color: "#64748b", letterSpacing: ".5px", textTransform: "uppercase", marginBottom: 4, display: "block" }}>How many did you buy?</label>
        <input type="text" inputMode="numeric" value={qty === 0 ? '' : qty} onChange={e => { const v = e.target.value.replace(/\D/g, ''); setQty(v === '' ? 0 : parseInt(v, 10)); }}
          style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1.5px solid #e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} />
      </div>
      <div>
        <label style={{ fontSize: 12, fontWeight: 700, color: "#64748b", letterSpacing: ".5px", textTransform: "uppercase", marginBottom: 4, display: "block" }}>Fill level of the new stock</label>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {FILL_LEVELS.map(l => (
            <button type="button" key={l} onClick={() => setFill(l)} style={{
              padding: "7px 14px", borderRadius: 99, border: "2px solid",
              borderColor: fill === l ? FILL_COLOR[l].dot : "#e2e8f0",
              background: fill === l ? FILL_COLOR[l].bg : "#fff",
              color: fill === l ? FILL_COLOR[l].text : "#94a3b8",
              fontWeight: 600, fontSize: 13, cursor: "pointer",
            }}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <button type="button" onClick={onCancel} style={{ flex: 1, padding: "12px", borderRadius: 12, border: "1.5px solid #e2e8f0", background: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", color: "#64748b" }}>Cancel</button>
        <button type="button" onClick={() => onConfirm(qty, fill)} style={{ flex: 2, padding: "12px", borderRadius: 12, border: "none", background: "#10b981", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Confirm restock</button>
      </div>
    </div>
  );
}

// ── Modal wrapper ─────────────────────────────────────────────────────────────
function Modal({ title, children, onClose }) {
  useEffect(() => {
    const preventBodyScroll = (e) => {
      if (!e.target.closest('.modal-sheet')) e.preventDefault();
    };
    document.addEventListener('touchmove', preventBodyScroll, { passive: false });
    return () => document.removeEventListener('touchmove', preventBodyScroll);
  }, []);
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.45)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} className="modal-sheet" style={{
        background: "#fff", borderRadius: "20px 20px 0 0", padding: "24px 20px 36px",
        width: "100%", maxWidth: 480,
        boxShadow: "0 -8px 40px rgba(0,0,0,.15)",
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
          <p style={{ margin: 0, fontSize: 17, fontWeight: 800, color: "#1a1a2e" }}>{title}</p>
          <button type="button" onClick={onClose} style={{ background: "#f1f5f9", border: "none", borderRadius: "50%", width: 32, height: 32, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b" }}>
            {svg(<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>, 16)}
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── ItemCard ──────────────────────────────────────────────────────────────────
function ItemCard({ item, onEdit, onDelete }) {
  const warn = needsRestock(item);
  return (
    <div style={{
      background: "#fff", borderRadius: 16, padding: "14px 16px",
      border: warn ? "1.5px solid #fca5a5" : "1.5px solid #f1f5f9",
      display: "flex", alignItems: "center", gap: 12,
      boxShadow: warn ? "0 2px 12px rgba(239,68,68,.08)" : "0 1px 4px rgba(0,0,0,.04)",
    }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
          <p style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "#1a1a2e", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}</p>
          {warn && <span style={{ color: "#f59e0b", display: "flex" }}><IconAlert size={14}/></span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
          <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 500 }}>{item.quantity} {item.quantity === 1 ? "unit" : "units"}</span>
          <FillBadge level={item.fill} small />
          <span style={{ fontSize: 11, color: "#cbd5e1", background: "#f8fafc", padding: "2px 7px", borderRadius: 99, fontWeight: 600 }}>{item.category}</span>
        </div>
      </div>
      <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
        <button type="button" onClick={() => onEdit(item)} style={{ width: 36, height: 36, borderRadius: 10, border: "1.5px solid #e2e8f0", background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b" }}><IconEdit size={15}/></button>
        <button type="button" onClick={() => onDelete(item)} style={{ width: 36, height: 36, borderRadius: 10, border: "1.5px solid #fca5a5", background: "#fff5f5", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#ef4444" }}><IconTrash size={15}/></button>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
 const [items, setItems] = useState(() => {
  try {
    const saved = localStorage.getItem("casa-items");
    return saved ? JSON.parse(saved) : defaultItems;
  } catch { return defaultItems; }
});
  const [tab, setTab]           = useState("shopping"); // shopping | inventory
  const [catFilter, setCat]     = useState("All");
  const [search, setSearch]     = useState("");
  const [modal, setModal]       = useState(null); // null | { type, payload }
useEffect(() => {
  localStorage.setItem("casa-items", JSON.stringify(items));
}, [items]);

  const closeModal = () => setModal(null);

  // derived
  const shoppingItems = useMemo(() => items.filter(needsRestock), [items]);

  const inventoryItems = useMemo(() => {
    let list = [...items].sort((a, b) => FILL_ORDER[b.fill] - FILL_ORDER[a.fill]);
    if (catFilter !== "All") list = list.filter(i => i.category === catFilter);
    if (search.trim()) list = list.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));
    return list;
  }, [items, catFilter, search]);

  // handlers
  const addItem    = (form) => { setItems(p => [...p, { ...form, id: uid() }]); closeModal(); };
  const editItem   = (form) => { setItems(p => p.map(i => i.id === modal.payload.id ? { ...i, ...form } : i)); closeModal(); };
  const deleteItem = (id)   => { setItems(p => p.filter(i => i.id !== id)); closeModal(); };
  const restock    = (item, qty, fill) => {
    setItems(p => p.map(i => i.id === item.id ? { ...i, quantity: i.quantity + qty, fill } : i));
    closeModal();
  };

  // ── layout vars
  const navBtn = (t, label, count) => (
    <button type="button" onClick={() => setTab(t)} style={{
      flex: 1, padding: "12px 0", border: "none", background: "none", cursor: "pointer",
      fontSize: 13, fontWeight: tab === t ? 800 : 500,
      color: tab === t ? "#7c3aed" : "#94a3b8",
      borderTop: tab === t ? "2.5px solid #7c3aed" : "2.5px solid transparent",
      display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
    }}>
      {label}
      {count > 0 && <span style={{ background: "#ef4444", color: "#fff", borderRadius: 99, fontSize: 10, fontWeight: 800, padding: "1px 6px" }}>{count}</span>}
    </button>
  );

  return (
    <div style={{ fontFamily: "'DM Sans', 'Segoe UI', sans-serif", background: "#faf5ff", minHeight: "100vh", display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto", position: "relative" }}>

      {/* header */}
      <div style={{ background: "linear-gradient(135deg, #7c3aed 0%, #ec4899 100%)", padding: "28px 20px 20px", color: "#fff" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 2 }}>
          <IconHome size={22} />
          <p style={{ margin: 0, fontSize: 22, fontWeight: 900, letterSpacing: "-.5px" }}>Casa</p>
        </div>
        <p style={{ margin: 0, fontSize: 13, color: "#94a3b8" }}>
          {items.length} items tracked · {shoppingItems.length} need restock
        </p>
      </div>

      {/* tab bar */}
      <div style={{ background: "#fff", display: "flex", borderBottom: "1px solid #f1f5f9", position: "sticky", top: 0, zIndex: 10 }}>
        {navBtn("shopping",  <span style={{display:"flex",alignItems:"center",gap:5}}><IconCart size={16}/>Shopping</span>,  shoppingItems.length)}
        {navBtn("inventory", <span style={{display:"flex",alignItems:"center",gap:5}}><IconPackage size={16}/>Inventory</span>, 0)}
      </div>

      {/* content */}
      <div style={{ flex: 1, padding: "16px 16px 100px", display: "flex", flexDirection: "column", gap: 12 }}>

        {tab === "inventory" && <>
          {/* search */}
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search items…"
            style={{ padding: "10px 14px", borderRadius: 12, border: "1.5px solid #e2e8f0", fontSize: 14, outline: "none", background: "#fff", fontFamily: "inherit" }} />

          {/* category filters */}
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
            {["All", ...CATEGORIES].map(c => (
              <CategoryPill key={c} cat={c} active={catFilter === c} onClick={() => setCat(c)} />
            ))}
          </div>

          {/* items */}
          {inventoryItems.length === 0
            ? <div style={{ textAlign: "center", padding: "48px 0", color: "#cbd5e1", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
                <IconInbox size={48}/>
                <p style={{ fontWeight: 700, margin: 0, color: "#94a3b8" }}>No items found</p>
              </div>
            : inventoryItems.map(item => (
                <ItemCard key={item.id} item={item}
                  onEdit={i => setModal({ type: "edit", payload: i })}
                  onDelete={i => deleteItem(i.id)}
                />
              ))
          }
        </>}

        {tab === "shopping" && <>
          {shoppingItems.length === 0
            ? <div style={{ textAlign: "center", padding: "48px 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
                <span style={{ color: "#10b981" }}><IconCheck size={48}/></span>
                <p style={{ fontWeight: 700, margin: 0, color: "#94a3b8" }}>All stocked up!</p>
                <p style={{ fontSize: 13, margin: 0, color: "#cbd5e1" }}>Nothing needs restocking right now.</p>
              </div>
            : <>
                <p style={{ margin: 0, fontSize: 13, color: "#94a3b8", fontWeight: 600 }}>{shoppingItems.length} item{shoppingItems.length > 1 ? "s" : ""} to buy</p>
                {CATEGORIES.map(cat => {
                  const catItems = shoppingItems.filter(i => i.category === cat);
                  if (!catItems.length) return null;
                  return (
                    <div key={cat}>
                      <p style={{ margin: "8px 0 8px", fontSize: 12, fontWeight: 800, color: "#94a3b8", letterSpacing: ".8px", textTransform: "uppercase" }}>{cat}</p>
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {catItems.map(item => (
                          <div key={item.id} style={{ background: "#fff", borderRadius: 14, padding: "12px 16px", border: "1.5px solid #fca5a5", display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{ flex: 1 }}>
                              <p style={{ margin: "0 0 4px", fontSize: 15, fontWeight: 700, color: "#1a1a2e" }}>{item.name}</p>
                              <div style={{ display: "flex", gap: 8 }}>
                                <span style={{ fontSize: 12, color: "#94a3b8" }}>{item.quantity} unit{item.quantity !== 1 ? "s" : ""}</span>
                                <FillBadge level={item.fill} small />
                              </div>
                            </div>
                            <button type="button" onClick={() => setModal({ type: "restock", payload: item })}
                              style={{ padding: "8px 14px", borderRadius: 10, border: "none", background: "#7c3aed", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer", boxShadow: "0 2px 8px rgba(124,58,237,.35)" }}>
                              Restock
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </>
          }
        </>}
      </div>

      {/* FAB */}
      <button type="button" onClick={() => setModal({ type: "add" })} style={{
        position: "fixed", bottom: 28, right: 20, width: 56, height: 56,
        borderRadius: "50%", border: "none", background: "linear-gradient(135deg, #7c3aed, #ec4899)", color: "#fff",
        fontSize: 26, cursor: "pointer", boxShadow: "0 4px 20px rgba(124,58,237,.5)",
        display: "flex", alignItems: "center", justifyContent: "center",
      }}>+</button>

      {/* modals */}
      {modal?.type === "add" && (
        <Modal title="Add item" onClose={closeModal}>
          <ItemForm onSave={addItem} onCancel={closeModal} />
        </Modal>
      )}

      {modal?.type === "edit" && (
        <Modal title="Edit item" onClose={closeModal}>
          <ItemForm initial={modal.payload} onSave={editItem} onCancel={closeModal} />
          <button type="button" onClick={() => deleteItem(modal.payload.id)} style={{ width: "100%", marginTop: 12, padding: "12px", borderRadius: 12, border: "1.5px solid #fca5a5", background: "#fff", color: "#ef4444", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
            Delete item
          </button>
        </Modal>
      )}

      {modal?.type === "restock" && (
        <Modal title="Restock" onClose={closeModal}>
          <RestockPrompt item={modal.payload} onConfirm={(qty, fill) => restock(modal.payload, qty, fill)} onCancel={closeModal} />
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
